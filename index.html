<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HRV B-0 deep-link test</title>
<style>body{background:#000;color:#0f0;font:15px monospace;padding:12px;margin:0}#big{font-size:34px;font-weight:bold}#log{font-size:12px;color:#8f8;white-space:pre-wrap;margin-top:8px}</style></head>
<body>
<div id="big">startar…</div>
<div id="log"></div>
<video id="v" autoplay playsinline muted style="width:100px;height:75px;border:1px solid #333"></video>
<canvas id="c" width="32" height="24" style="display:none"></canvas>
<script>
// B-0 DEEP-LINK-TEST: host äger torch (setTorchMode). Sidan capturar kort, och vid mätslut
// NAVIGERAR till custom-scheme hrvresult:// med en CANNED HRV-payload + uppmätt rMean (torch-proof).
// Chrome (TWA) ska avfyra den externa intenten → native BridgeResultActivity i förgrund.
const BIG=document.getElementById('big'),LOG=document.getElementById('log'),V=document.getElementById('v'),C=document.getElementById('c');
const cx=C.getContext('2d',{willReadFrequently:true});
let rows=[], t0=0, res='?', wl=null, WINDOW_MS=20000;
function log(m){ LOG.textContent += m+'\n'; }

async function start(){
  try{
    try{ wl=await navigator.wakeLock.request('screen'); }catch(_){}
    const stm=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:160},height:{ideal:120},frameRate:{ideal:60,min:30}}});
    V.srcObject=stm; await V.play(); const se=stm.getVideoTracks()[0].getSettings();
    res=(se.width||'?')+'x'+(se.height||'?')+'@'+(se.frameRate?se.frameRate.toFixed(0):'?');
    BIG.textContent='capturar '+res; log('getUserMedia OK '+res); t0=performance.now(); requestAnimationFrame(tick);
  }catch(e){ BIG.textContent='getUserMedia FAIL '+e.name; log('FAIL '+e.name); }
}
function tick(){
  cx.drawImage(V,0,0,32,24); const px=cx.getImageData(4,4,24,16).data; let r=0,n=0;
  for(let i=0;i<px.length;i+=4){r+=px[i];n++;}
  const t=performance.now()-t0,R=r/n; rows.push(R);
  BIG.textContent='R='+R.toFixed(0)+(R>100?' ✓torch':R<5?' ✗SVART':'')+'  '+(t/1000|0)+'s';
  if(t<WINDOW_MS) requestAnimationFrame(tick); else finish();
}
function finish(){
  const rMean = rows.length ? Math.round(rows.reduce((a,b)=>a+b,0)/rows.length) : 0;
  const fps = (rows.length/(WINDOW_MS/1000)).toFixed(0);
  // CANNED HRV-payload (B-0 isolerar mekanismen från PPG-kvalitet) + uppmätt rMean = torch-proof.
  // DEEP-LINK: navigera custom-scheme → Chrome (TWA) avfyrar extern intent → native tar emot.
  const url = 'hrvresult://done?bpm=72&rmssd=35&sdnn=42&pnn50=18&meanRR=833&count=55&rej=3&sqi=78'
            + '&rMean='+rMean+'&fps='+fps;
  BIG.textContent='KLAR rMean='+rMean+' → öppnar native';
  log('navigerar: '+url);
  location.href = url;
}
window.addEventListener('load', start);
</script></body></html>
